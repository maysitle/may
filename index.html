<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>
<style>
body{margin:0;font-family:sans-serif;background:#111;color:#fff}
.chat{height:90vh;overflow:auto;padding:10px}
.msg{margin:5px 0;padding:10px;border-radius:10px;max-width:70%}
.user{background:#2563eb;margin-left:auto}
.bot{background:#333}
.input{position:fixed;bottom:0;width:100%;display:flex}
input{flex:1;padding:10px;border:none}
button{padding:10px;background:#2563eb;color:#fff;border:none}
</style>
</head>
<body>

<div class="chat" id="chat"></div>

<div class="input">
<input id="text" placeholder="输入...">
<button onclick="send()">发送</button>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("text");
const replies=["你好","加油","慢慢来","你可以的","别焦虑"];

function add(text,type){
const d=document.createElement("div");
d.className="msg "+type;
d.innerText=text;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
}

function send(){
const t=input.value.trim();
if(!t)return;
add(t,"user");
input.value="";
setTimeout(()=>{
add(replies[Math.floor(Math.random()*replies.length)],"bot");
},500);
}

input.addEventListener("keydown",e=>{
if(e.key==="Enter")send();
});
</script>

</body>
</html>
