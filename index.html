<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>私密聊天</title>

<style>
body{
    margin:0;
    font-family: -apple-system;
    background:#0f0f10;
    color:#fff;
}

.topbar{
    height:60px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,0.6);
    backdrop-filter: blur(20px);
    position:fixed;
    top:0;
    width:100%;
}

.chat{
    padding:80px 10px 100px;
}

.msg{
    max-width:70%;
    padding:12px;
    border-radius:14px;
    margin:8px 0;
}

.me{
    background:#c9a96a;
    margin-left:auto;
}

.ta{
    background:#2a2a2c;
}

.input{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    padding:10px;
    background:#111;
}

input{
    flex:1;
    padding:10px;
    border-radius:10px;
    border:none;
}

button{
    margin-left:8px;
    padding:10px 16px;
    background:#c9a96a;
    border:none;
    border-radius:10px;
}
</style>

</head>

<body>

<div class="topbar">想你</div>

<div class="chat" id="chat"></div>

<div class="input">
    <input id="text" placeholder="输入...">
    <button onclick="send()">发送</button>
</div>

<script>

let replies = [
"嗯？怎么了",
"我在",
"别乱想",
"我没走",
"你又在想我了？",
"笨蛋",
"我一直在看着你",
"说",
"嗯",
"别委屈"
]

function send(){
    let text = document.getElementById("text").value
    if(!text) return

    addMsg(text,"me")
    document.getElementById("text").value=""

    setTimeout(()=>{
        let r = replies[Math.floor(Math.random()*replies.length)]
        addMsg(r,"ta")
    },1000 + Math.random()*2000)
}

function addMsg(text,type){
    let div = document.createElement("div")
    div.className="msg "+type
    div.innerText=text
    document.getElementById("chat").appendChild(div)
    window.scrollTo(0,document.body.scrollHeight)
}

</script>

</body>
</html>
